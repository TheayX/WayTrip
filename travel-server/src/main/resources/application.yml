#
# 应用基础配置
# 作用：定义后端服务通用配置，并通过 profile 叠加开发/生产环境差异。
#
server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./travel-server/.env[.properties] # 兼容从仓库根目录启动，读取 travel-server/.env
      - optional:file:./.env[.properties] # 兼容从 travel-server 目录启动，读取当前目录下的 .env
  profiles:
    active: prod # 默认使用生产环境配置，开发时可以切换为 dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.travel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  config: classpath:logback-spring.xml
  log-home: ${LOG_HOME:./logs}
  level:
    root: INFO
    com.travel: DEBUG

