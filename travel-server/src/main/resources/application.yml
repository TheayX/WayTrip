server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]  # 从 .env 文件加载配置（文件不存在时不报错）
  profiles:
    active: prod # 默认使用生产环境配置，开发时可以切换为 dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.travel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# 日志配置
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.travel: DEBUG

ollama:
  base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
  model: ${OLLAMA_MODEL:qwen2.5:1.5b}
  system-prompt: ${OLLAMA_SYSTEM_PROMPT:}
  chat:
    max-history-rounds: ${OLLAMA_CHAT_MAX_HISTORY_ROUNDS:6}
    history-ttl-minutes: ${OLLAMA_CHAT_HISTORY_TTL_MINUTES:30}
    response-cache-minutes: ${OLLAMA_CHAT_RESPONSE_CACHE_MINUTES:2}
    hot-spot-summary-limit: ${OLLAMA_CHAT_HOT_SPOT_SUMMARY_LIMIT:6}
    personalization:
      recent-order-limit: ${OLLAMA_CHAT_PERSONALIZATION_RECENT_ORDER_LIMIT:3}
      recent-favorite-limit: ${OLLAMA_CHAT_PERSONALIZATION_RECENT_FAVORITE_LIMIT:5}
    rate-limit:
      ip-per-minute: ${OLLAMA_CHAT_RATE_LIMIT_IP_PER_MINUTE:24}
      session-per-minute: ${OLLAMA_CHAT_RATE_LIMIT_SESSION_PER_MINUTE:12}

