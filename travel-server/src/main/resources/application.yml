#
# 应用基础配置
# 作用：定义后端服务通用配置，并通过 profile 叠加开发/生产环境差异。
#
server:
  port: 8080

spring:
  config:
    import:
      - optional:file:./travel-server/.env[.properties] # 兼容从仓库根目录启动，读取 travel-server/.env
      - optional:file:./.env[.properties] # 兼容从 travel-server 目录启动，读取当前目录下的 .env
  profiles:
    active: prod # 默认使用生产环境配置，开发时可以切换为 dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  ai:
    model:
      chat: ${APP_AI_PROVIDER_TYPE:ollama}
      # 未显式指定 embedding 供应商时，默认跟随聊天供应商，支持一键切换整个 AI 链路。
      embedding: ${APP_AI_EMBEDDING_PROVIDER_TYPE:${APP_AI_PROVIDER_TYPE:ollama}}
    openai:
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${OPENAI_API_KEY:}
      chat:
        completions-path: /chat/completions
        options:
          model: ${APP_AI_PROVIDER_CHAT_MODEL:qwen3.5-plus}
          temperature: ${APP_AI_CHAT_TEMPERATURE:0.2}
      embedding:
        embeddings-path: /embeddings
        options:
          model: ${APP_AI_PROVIDER_EMBEDDING_MODEL:text-embedding-v4}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      chat:
        options:
          model: ${APP_AI_PROVIDER_CHAT_MODEL:qwen2.5:1.5b}
          temperature: ${APP_AI_CHAT_TEMPERATURE:0.2}
      embedding:
        options:
          model: ${APP_AI_PROVIDER_EMBEDDING_MODEL:nomic-embed-text}

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.travel.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    com.travel: DEBUG

app:
  ai:
    provider:
      type: ${APP_AI_PROVIDER_TYPE:ollama}
      chat-model: ${APP_AI_PROVIDER_CHAT_MODEL:qwen2.5:1.5b}
      embedding-model: ${APP_AI_PROVIDER_EMBEDDING_MODEL:nomic-embed-text}
    chat:
      timeout-seconds: ${APP_AI_CHAT_TIMEOUT_SECONDS:60}
      max-input-length: ${APP_AI_CHAT_MAX_INPUT_LENGTH:800}
      max-history-rounds: ${APP_AI_CHAT_MAX_HISTORY_ROUNDS:8}
      system-prompt: ${APP_AI_CHAT_SYSTEM_PROMPT:你是 WayTrip 旅游助手。请始终使用简体中文，回答简洁、友好、可执行。涉及价格、库存、退款、时效时，必须明确说明以页面规则和系统真实数据为准。}
    tool:
      enabled: ${APP_AI_TOOL_ENABLED:true}
      max-calls-per-request: ${APP_AI_TOOL_MAX_CALLS_PER_REQUEST:6}
    rag:
      enabled: ${APP_AI_RAG_ENABLED:false}
      top-k: ${APP_AI_RAG_TOP_K:4}
      min-score: ${APP_AI_RAG_MIN_SCORE:0.65}
    vector:
      redis:
        host: ${APP_AI_VECTOR_REDIS_HOST:127.0.0.1}
        port: ${APP_AI_VECTOR_REDIS_PORT:6379}
        password: ${APP_AI_VECTOR_REDIS_PASSWORD:}
        client-name: ${APP_AI_VECTOR_REDIS_CLIENT_NAME:waytrip-ai-vector}
        timeout-seconds: ${APP_AI_VECTOR_REDIS_TIMEOUT_SECONDS:3}
        ssl-enabled: ${APP_AI_VECTOR_REDIS_SSL_ENABLED:false}
        index-name: ${APP_AI_VECTOR_REDIS_INDEX_NAME:waytrip-ai-knowledge-index}
        prefix: ${APP_AI_VECTOR_REDIS_PREFIX:waytrip:ai:chunk:}
        initialize-schema: ${APP_AI_VECTOR_REDIS_INITIALIZE_SCHEMA:true}
    memory:
      ttl-minutes: ${APP_AI_MEMORY_TTL_MINUTES:60}
      history-rounds: ${APP_AI_MEMORY_HISTORY_ROUNDS:8}
      summary-enabled: ${APP_AI_MEMORY_SUMMARY_ENABLED:true}
    guardrail:
      rate-limit-ip-per-minute: ${APP_AI_GUARDRAIL_RATE_LIMIT_IP_PER_MINUTE:24}
      rate-limit-session-per-minute: ${APP_AI_GUARDRAIL_RATE_LIMIT_SESSION_PER_MINUTE:12}
    metrics:
      enabled: ${APP_AI_METRICS_ENABLED:true}

