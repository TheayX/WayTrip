# 生产环境配置
# 敏感值通过 travel-server/.env 注入，参考 .env.example
# 用途：生产部署默认配置，优先从环境变量或 .env 中读取敏感参数。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:waytrip_db}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3s
      connect-timeout: 3s
      client-name: ${REDIS_CLIENT_NAME:waytrip-prod}
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:32}
          max-idle: ${REDIS_POOL_MAX_IDLE:16}
          min-idle: ${REDIS_POOL_MIN_IDLE:4}
          max-wait: 3s
        shutdown-timeout: 100ms

# 应用级配置
app:
  cache:
    recommendation:
      user-rec-ttl-minutes: ${APP_CACHE_RECOMMENDATION_USER_REC_TTL_MINUTES:60}
      similarity-ttl-hours: ${APP_CACHE_RECOMMENDATION_SIMILARITY_TTL_HOURS:24}
  task:
    spot-heat-sync-cron: ${APP_TASK_SPOT_HEAT_SYNC_CRON:0 30 3 * * ?}

# JWT 配置
jwt:
  secret: ${JWT_SECRET:}
  expiration: 604800000  # 7天（毫秒）
  admin-expiration: 86400000  # 1天（毫秒）

# 微信小程序配置
wx:
  appid: ${WECHAT_APPID:}
  secret: ${WECHAT_SECRET:}

# 文件上传配置
upload:
  path: ${UPLOAD_PATH:./uploads}
  max-size: 5242880  # 5MB

# 生产环境关闭 SQL 日志（取消注释即可）
