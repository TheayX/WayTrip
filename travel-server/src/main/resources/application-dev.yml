# 开发环境配置
# 用途：本地开发默认配置。
# 说明：数据库、Redis、JWT、微信与上传目录都可以继续通过 travel-server/.env 覆盖。
spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/waytrip_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password:
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3s
      connect-timeout: 3s
      client-name: waytrip-dev
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3s
        shutdown-timeout: 100ms

# 应用级配置
app:
  cache:
    recommendation:
      user-rec-ttl-minutes: 60
      similarity-ttl-hours: 24
    home:
      hot-spots-ttl-minutes: 10
      banners-ttl-minutes: 10
  task:
    spot-heat-sync-cron: 0 30 3 * * ?

# JWT 配置
jwt:
  secret:
  expiration: 604800000  # 7天（毫秒）
  admin-expiration: 86400000  # 1天（毫秒）

# 微信小程序配置
wx:
  appid:
  secret:

# 文件上传配置
upload:
  path: ${UPLOAD_PATH:./uploads}
  max-size: 5242880  # 5MB
